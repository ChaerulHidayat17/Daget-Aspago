<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Unlock Link</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.25), transparent 30%),
        radial-gradient(circle at bottom right, rgba(168,85,247,0.25), transparent 30%),
        linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow: hidden;
    }

    .wrapper {
      width: 100%;
      max-width: 760px;
      text-align: center;
    }

    .title {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #cbd5e1;
      margin-bottom: 20px;
      line-height: 1.6;
      font-size: 15px;
    }

    .score-board {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 12px 20px;
      border-radius: 14px;
      margin-bottom: 18px;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .game {
      position: relative;
      width: 100%;
      height: 280px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,0.25);
    }

    .game::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(255,255,255,0.05), transparent 60%);
      pointer-events: none;
    }

    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 55px;
      background: rgba(255,255,255,0.14);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .player {
      position: absolute;
      left: 70px;
      bottom: 55px;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      box-shadow: 0 10px 20px rgba(56,189,248,0.35);
    }

    .obstacle {
      position: absolute;
      left: 100%;
      bottom: 55px;
      width: 28px;
      height: 52px;
      border-radius: 10px;
      background: linear-gradient(180deg, #fb7185, #ef4444);
      box-shadow: 0 10px 20px rgba(239,68,68,0.28);
    }

    .instruction {
      margin-top: 18px;
      color: #94a3b8;
      font-size: 14px;
    }

    .result {
      min-height: 26px;
      margin-top: 14px;
      font-size: 16px;
      font-weight: bold;
    }

    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 20px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg, #38bdf8, #6366f1);
      color: white;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: 0.2s;
      box-shadow: 0 12px 24px rgba(59,130,246,0.28);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .restart-btn {
      display: none;
    }

    .hidden {
      display: none !important;
    }

    .popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 20px;
    }

    .popup-box {
      width: 100%;
      max-width: 360px;
      background: linear-gradient(180deg, #111827, #0f172a);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
      animation: popIn 0.3s ease;
    }

    .popup-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 14px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      background: rgba(34,197,94,0.14);
      border: 1px solid rgba(34,197,94,0.2);
    }

    .popup-box h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .popup-box p {
      color: #cbd5e1;
      line-height: 1.6;
      margin-bottom: 18px;
      font-size: 15px;
    }

    .link-btn {
      width: 100%;
      display: block;
      margin-top: 8px;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      box-shadow: 0 14px 28px rgba(34,197,94,0.25);
    }

    .close-btn {
      width: 100%;
      margin-top: 10px;
      background: rgba(255,255,255,0.08);
      box-shadow: none;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.82);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 600px) {
      .title {
        font-size: 28px;
      }

      .game {
        height: 240px;
      }

      .player {
        left: 50px;
        width: 38px;
        height: 38px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="title">Game Unlock Link</div>
    <div class="subtitle">
      Tekan <b>SPACE</b> atau <b>klik/tap area game</b> untuk loncat.  
      Capai skor <b>10</b> supaya link gadget terbuka.
    </div>

    <div class="score-board">Skor: <span id="score">0</span> / 10</div>

    <div class="game" id="game">
      <div class="player" id="player"></div>
      <div class="obstacle" id="obstacle"></div>
      <div class="ground"></div>
    </div>

    <div class="instruction">Hindari rintangan merah. Kalau kena, game over.</div>
    <div class="result" id="result"></div>

    <button id="restartBtn" class="btn restart-btn">Main Lagi</button>
  </div>

  <div id="popup" class="popup hidden">
    <div class="popup-box">
      <div class="popup-icon">🎉</div>
      <h2>Selamat!</h2>
      <p>Kamu berhasil mencapai skor 10 dan membuka akses link gadget.</p>

      <a href="https://link.dana.id/danakaget?c=s5knqnn6b&r=ftYQxy&orderId=20260320101214728915010300166428569890965" target="_blank" class="btn link-btn">
        Buka Link Gadget
      </a>

      <button class="btn close-btn" onclick="closePopup()">Tutup</button>
    </div>
  </div>

  <script>
    const player = document.getElementById("player");
    const obstacle = document.getElementById("obstacle");
    const scoreEl = document.getElementById("score");
    const result = document.getElementById("result");
    const restartBtn = document.getElementById("restartBtn");
    const popup = document.getElementById("popup");
    const game = document.getElementById("game");

    const targetScore = 10;
    const groundHeight = 55;
    const gameWidth = 760;

    let isJumping = false;
    let jumpHeight = 0;
    let score = 0;
    let gameOver = false;
    let obstacleX = game.offsetWidth;
    let speed = 6;
    let passedObstacle = false;
    let loopId = null;

    function updatePlayerPosition() {
      player.style.bottom = (groundHeight + jumpHeight) + "px";
    }

    function jump() {
      if (isJumping || gameOver) return;
      isJumping = true;

      let upInterval = setInterval(() => {
        if (jumpHeight >= 115) {
          clearInterval(upInterval);

          let downInterval = setInterval(() => {
            if (jumpHeight <= 0) {
              clearInterval(downInterval);
              jumpHeight = 0;
              updatePlayerPosition();
              isJumping = false;
            } else {
              jumpHeight -= 5;
              updatePlayerPosition();
            }
          }, 20);
        } else {
          jumpHeight += 5;
          updatePlayerPosition();
        }
      }, 20);
    }

    function showPopup() {
      popup.classList.remove("hidden");
    }

    function closePopup() {
      popup.classList.add("hidden");
    }

    function finishGame() {
      gameOver = true;
      clearInterval(loopId);
    }

    function startLoop() {
      clearInterval(loopId);

      loopId = setInterval(() => {
        if (gameOver) return;

        const currentGameWidth = game.clientWidth;
        const obstacleWidth = obstacle.offsetWidth;
        const playerLeft = player.offsetLeft;
        const playerRight = playerLeft + player.offsetWidth;

        obstacleX -= speed;
        obstacle.style.left = obstacleX + "px";

        const obstacleLeft = obstacleX;
        const obstacleRight = obstacleX + obstacleWidth;

        const playerBottom = groundHeight + jumpHeight;
        const playerTop = playerBottom + player.offsetHeight;

        const obstacleBottom = groundHeight;
        const obstacleTop = obstacleBottom + obstacle.offsetHeight;

        const horizontalHit = playerRight > obstacleLeft && playerLeft < obstacleRight;
        const verticalHit = playerBottom < obstacleTop && playerTop > obstacleBottom;

        if (horizontalHit && verticalHit) {
          finishGame();
          result.innerHTML = "<span style='color:#f87171;'>Game over 😅</span>";
          restartBtn.style.display = "inline-block";
          return;
        }

        if (!passedObstacle && obstacleRight < playerLeft) {
          passedObstacle = true;
          score++;
          scoreEl.textContent = score;

          if (score >= targetScore) {
            finishGame();
            result.innerHTML = "<span style='color:#86efac;'>Selamat! Score target tercapai 🎉</span>";
            restartBtn.style.display = "inline-block";
            showPopup();
            return;
          }
        }

        if (obstacleX < -obstacleWidth - 20) {
          obstacleX = currentGameWidth + Math.random() * 120;
          passedObstacle = false;
        }
      }, 20);
    }

    function resetGame() {
      clearInterval(loopId);
      score = 0;
      jumpHeight = 0;
      isJumping = false;
      gameOver = false;
      passedObstacle = false;
      obstacleX = game.clientWidth;

      scoreEl.textContent = score;
      result.innerHTML = "";
      restartBtn.style.display = "none";
      popup.classList.add("hidden");

      updatePlayerPosition();
      obstacle.style.left = obstacleX + "px";

      startLoop();
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        jump();
      }
    });

    game.addEventListener("click", jump);
    game.addEventListener("touchstart", function(e) {
      e.preventDefault();
      jump();
    }, { passive: false });

    restartBtn.addEventListener("click", resetGame);

    updatePlayerPosition();
    obstacle.style.left = obstacleX + "px";
    startLoop();
  </script>
</body>
</html>
